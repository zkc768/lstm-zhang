stage_name: 00_data_split_label_freeze
route: lst_models
scope: validation_only
holdout_test_contact: false

inputs:
  raw_data_manifest: configs/lst_models_data.yaml
  notebook_path: notebooks/00_data_split_label_freeze_colab.ipynb
  raw_data_dir: /content/lst_models_raw_stock_data

outputs:
  output_dir: /content/lst_models_results/00_data_split_label_freeze
  manifest: run_manifest.json
  artifact_inventory: artifact_inventory.csv
  raw_data_manifest: raw_data_manifest.json
  split_freeze: split_freeze.json
  label_policy: label_policy.json
  baseline_registry: baseline_registry.json
  label_validity_summary: label_validity_summary.csv
  sample_event_index: sample_event_index.csv

split:
  train_start: "1998-01-02"
  train_end: "2013-09-16"
  validation_start: "2013-09-16"
  validation_end: "2017-01-25"
  closed_holdout_test_start: "2017-01-25"

label_policy:
  label_config_id: h09_bps3p0
  operator: endpoint_cumulative_return
  horizon_k: 9
  no_trade_band_bps: 3.0
  up_label: 1
  down_label: 0
  invalid_label: null

baseline_registry:
  mandatory_trivial:
    - stratified_dummy_train_prior
    - majority_train_prior
    - constant_up
    - constant_down

stage01_handoff:
  may_search:
    - feature_set
    - window_size
    - lightweight_train_inner_shape_signal_checks
  must_not_search:
    - label_operator
    - horizon_k
    - no_trade_band_bps
    - calendar_split_boundaries
    - holdout_test_wording
