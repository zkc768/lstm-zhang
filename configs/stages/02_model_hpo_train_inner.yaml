stage_name: 02_model_hpo_train_inner
route: lst_models
scope: validation_only
holdout_test_contact: false

inputs:
  stage00_run_id: "20260609_015034_927813"
  stage00_runtime_run_dir: /content/lst_models_results/00_data_split_label_freeze/20260609_015034_927813
  stage00_drive_run_dir: My Drive/lst_models/results/00_data_split_label_freeze/20260609_015034_927813
  stage00_drive_path_parts:
    - lst_models
    - results
    - 00_data_split_label_freeze
    - "20260609_015034_927813"
  raw_data_manifest: configs/lst_models_data.yaml
  raw_data_dir: /content/lst_models_raw_stock_data
  required_stage00_artifacts:
    - raw_data_manifest.json
    - split_freeze.json
    - label_policy.json
    - baseline_registry.json
    - sample_event_index.csv
    - run_manifest.json
  stage01_run_id: "20260609_070204"
  stage01_runtime_run_dir: /content/lst_models_results/01_feature_window_search/20260609_070204
  stage01_drive_run_dir: My Drive/lst_models/results/01_feature_window_search/20260609_070204
  stage01_drive_path_parts:
    - lst_models
    - results
    - 01_feature_window_search
    - "20260609_070204"
  stage01_candidate_inputs: /content/lst_models_results/01_feature_window_search/20260609_070204/01_candidate_inputs.json
  notebook_path: notebooks/02_model_hpo_train_inner_colab.ipynb
  required_stage01_artifacts:
    - run_manifest.json
    - artifact_inventory.csv
    - 01_candidate_inputs.json
    - 01_feature_window_search_summary.csv
    - 01_train_inner_probe_ledger.csv
    - 01_train_inner_fold_manifest.csv
    - 01_train_label_band_diagnostic.csv

outputs:
  output_dir: /content/lst_models_results/02_model_hpo_train_inner
  manifest: run_manifest.json
  artifact_inventory: artifact_inventory.csv
  summary: 02_model_hpo_train_inner_summary.csv
  hpo_plan_ledger: 02_hpo_plan_ledger.csv
  hpo_trial_ledger: 02_hpo_trial_ledger.csv
  hpo_summary: 02_hpo_summary.csv
  baseline_control_summary: 02_baseline_control_summary.csv
  frozen_candidate: 02_frozen_candidate.json
  frozen_candidate_markdown: 02_frozen_candidate.md
  frozen_params_dir: frozen_params
  best_params_by_family: 02_best_params_by_family.json
  stage03_handoff: 02_stage03_handoff.json

train_inner:
  n_folds: 3
  seeds: [101, 202]
  official_validation_for_selection: false
  event_overlap_count_required: 0

hpo_families:
  lightgbm:
    enabled: true
    search_space: configs/models/lightgbm/search_space.yaml
  standard_dlinear:
    enabled: true
    search_space: configs/models/standard_dlinear/search_space.yaml
  tcn:
    enabled: true
    search_space: configs/models/tcn/search_space.yaml
  ms_dlinear_tcn:
    enabled: true
    search_space: configs/models/ms_dlinear_tcn/search_space.yaml

baseline_controls:
  mandatory:
    - stratified_dummy_train_prior
    - majority_train_prior
    - constant_up
    - constant_down

optional_fixed_controls:
  simple_gru:
    enabled: false
    stage02_hpo_family: false
  shallow_lstm:
    enabled: false
    stage02_hpo_family: false

budget:
  max_hpo_plan_rows: 240
  max_profiles_per_family: 8

hpo_sample_policy:
  max_train_samples_per_fold: 50000
  max_eval_samples_per_fold: 20000
  sample_method: deterministic_even_stride_by_ticker_label

lightgbm_training_defaults:
  eval_metric: binary_logloss
  early_stopping_rounds: 25

probe_training_defaults:
  torch:
    epochs: 12
    batch_size: 1024
    learning_rate: 0.001
    weight_decay: 0.0001
    device: auto
    require_gpu: false
    optimizer: AdamW
    loss: class_weighted_cross_entropy
    early_stopping: none

checkpointing:
  enabled: true
  checkpoint_every_trials: 8
  checkpoint_dir: /content/lst_models_checkpoints/02_model_hpo_train_inner

selection_rules:
  primary_metric: macro_f1
  baseline: stratified_dummy_train_prior
  require_completed_rows_before_stage03: true
  max_selected_configs_per_family: 1
  no_official_validation_selection: true
  no_final_model_selected: true

stage03_handoff:
  allowed_when_hpo_complete: true
  output_name: 02_stage03_handoff.json

forbidden:
  search_axes:
    - label_operator
    - horizon_k
    - no_trade_band_bps
    - calendar_split_boundaries
    - official_validation_tiebreaker
    - holdout_test_wording
  wording:
    - final model
    - official validation winner
    - holdout winner
    - test winner
    - proved best model
