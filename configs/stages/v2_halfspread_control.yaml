stage_name: v2_halfspread_control
route: lst_models
scope: halfspread_control_measure_only
new_scoring_events: 0
official_validation_scoring_events: 0
official_validation_for_selection: false
no_final_model_selected: true
v2_frozen_selection_unchanged: true
preregistration: docs/protocols/v2_halfspread_control_preregistration_20260701.md

# UN-ARMED in the repo (v2_1 precedent): the committed config cannot execute.
# The notebook injects run_domain = "validation" or "guarded" per invocation;
# one domain per run folder; the two domains are NEVER pooled.
run_domain: null

# Pre-registered estimator (preregistration section 4; frozen before any run).
estimator:
  primary: roll_1984_halfspread
  roll_window_days: 21          # trailing observed trading days, day d excluded
  roll_min_pairs: 400           # below -> insufficient_history cell
  band_bps: 3.0                 # must equal label_policy.no_trade_band_bps
  ratio_edges: [0.5, 1.0, 2.0]  # fine cells: <=0.5 / (0.5,1] / (1,2] / >2
  robustness: corwin_schultz_2012
  cs_min_spans: 200

# Pre-registered readout (preregistration sections 6-8; frozen before any run).
readout:
  seeds: [101, 202]
  candidate_id: price_volume_time_w20
  primary_model_row: tcn_frozen_primary
  report_min_rows: 200
  verdict_min_rows: 5000
  random_prior: 0.5
  bootstrap:
    device: trading_day_block_bootstrap
    block_id: ticker_trading_day
    iterations: 1000
    seed: 12345
  descriptive_note: >-
    half-spread settlement control (measure-only re-aggregation; no new
    scoring); block-bootstrap intervals are descriptive context, never a
    significance test; no operating point; activity is the eligible-row-count
    proxy, not volume or liquidity

# Frozen label policy echo (source of the 3.0 bps band; Stage 00 freeze).
label_policy:
  label_config_id: h09_bps3p0
  operator: endpoint_cumulative_return
  horizon_k: 9
  no_trade_band_bps: 3.0

domains:
  validation:
    evidence_domain: official_validation
    data_segment: validation_2013_2017
    holdout_test_contact: false
    official_validation_contact: read_frozen_artifacts_only
    holdout_boundary: "2017-01-25"
    stage00_run_id: "20260610_051705_347450"
    stage00_runtime_run_dir: /content/lst_models_results/00_data_split_label_freeze/20260610_051705_347450
    stage00_drive_path_parts: [lst_models, results, 00_data_split_label_freeze, "20260610_051705_347450"]
    required_stage00_artifacts:
      - raw_data_manifest.json
      - split_freeze.json
      - label_policy.json
      - baseline_registry.json
      - sample_event_index.csv
      - run_manifest.json
      - artifact_inventory.csv
    stage01_run_id: "20260610_075002"
    stage01_runtime_run_dir: /content/lst_models_results/01_feature_window_search/20260610_075002
    stage01_drive_path_parts: [lst_models, results, 01_feature_window_search, "20260610_075002"]
    required_stage01_artifacts:
      - run_manifest.json
      - artifact_inventory.csv
      - 01_candidate_inputs.json
      - 01_feature_window_search_summary.csv
    stage03_run_id: "20260610_133305_716174"
    stage03_runtime_run_dir: /content/lst_models_results/03_frozen_validation_readout/20260610_133305_716174
    stage03_drive_path_parts: [lst_models, results, 03_frozen_validation_readout, "20260610_133305_716174"]
    required_stage03_artifacts:
      - run_manifest.json
      - artifact_inventory.csv
      - 03_decision_record.json
      - 03_validation_predictions.csv
      - 03_same_row_baselines.csv
      - 03_per_ticker_readout.csv
    dump: 03_validation_predictions.csv
    expected_dump_rows: 302128
    # Deterministic replay of the frozen stratified dummy, dual equality gates
    # (Stage 04 mechanism, protocol section 10). Reconstruction-or-nothing.
    baseline_reconstruction:
      enabled: true
      baseline_id: stratified_dummy_train_prior
      equality_tolerance: 1.0e-9
  guarded:
    evidence_domain: guarded_walkforward
    data_segment: guarded_holdout_2017_2024
    holdout_test_contact: true
    holdout_contact_tier: guarded_historically_contacted
    clean_test_claim: false
    window_end_exclusive: "2024-04-19"
    v2_1_run_id: "20260618_063559_889276"
    v2_1_runtime_run_dir: /content/lst_models_results/v2_1_guarded_walkforward_readout/20260618_063559_889276
    v2_1_drive_path_parts: [lst_models, results, v2_1_guarded_walkforward_readout, "20260618_063559_889276"]
    required_v2_1_artifacts:
      - run_manifest.json
      - artifact_inventory.csv
      - v2_1_decision_record.json
      - v2_1_predictions.csv
      - v2_1_baseline_predictions.csv
    predictions: v2_1_predictions.csv
    baseline_predictions: v2_1_baseline_predictions.csv
    # All four family rows are read out (report-all, no selection); the
    # discriminating low-tercile table and the verdict use the primary row only.
    model_rows:
      - tcn_frozen_primary
      - lightgbm_family_best
      - standard_dlinear_family_best
      - ms_dlinear_tcn_family_best

inputs:
  raw_data_manifest: configs/lst_models_data.yaml
  raw_data_dir: /content/lst_models_raw_stock_data
  notebook_path: notebooks/v2_halfspread_control_colab.ipynb
  protocol_path: docs/protocols/v2_halfspread_control_preregistration_20260701.md

outputs:
  output_dir: /content/lst_models_results/v2_halfspread_control
  manifest: run_manifest.json
  artifact_inventory: artifact_inventory.csv
  day_spread: halfspread_day_spread.csv
  partition_readout: halfspread_partition_readout.csv
  low_tercile_readout: halfspread_low_tercile_readout.csv
  occupancy: halfspread_occupancy.csv
  autocov_by_tercile: halfspread_autocov_by_tercile.csv
  cs_robustness_readout: halfspread_cs_robustness_readout.csv
  verdict: halfspread_verdict.json

# Template for the Stage 05 validation-budget ledger contact entries to be
# appended AFTER the runs (preregistration section 3). Events are resolved
# from each run manifest's new_scoring_events field (must be 0), never typed.
budget_ledger_contact_entry_template:
  - stage_name: v2_halfspread_control
    run_id_key: halfspread_validation
    evidence_domain: official_validation
    data_segment: validation_2013_2017
    contact_type: read_frozen_artifacts_only_plus_raw_bar_reaggregation
    events_source_key: halfspread_validation
    events_field: new_scoring_events
    for_selection: false
    notes: "disclosed diagnostic re-aggregation of the frozen Stage 03 dump by a raw-bar Roll half-spread proxy; zero new fit/predict events"
  - stage_name: v2_halfspread_control
    run_id_key: halfspread_guarded
    evidence_domain: guarded_walkforward
    data_segment: guarded_holdout_2017_2024
    contact_type: guarded_historically_contacted
    events_source_key: halfspread_guarded
    events_field: new_scoring_events
    for_selection: false
    notes: "same measure-only re-aggregation on the frozen V2.1 dumps; non-independent guarded context, never pooled with validation"

forbidden:
  wording:
    - clean test
    - clean holdout
    - unseen holdout
    - untouched test
    - untouched holdout
    - final model
    - best model
    - superior
    - outperforms
    - profitable
    - tradable alpha
    - economically profitable
    - statistically significant
    - well-calibrated
    - out-of-sample proof
    - final evidence
    - walk-forward winner
    - selected by official validation
    - chosen threshold
