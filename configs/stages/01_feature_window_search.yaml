stage_name: 01_feature_window_search
route: lst_models
scope: validation_only
holdout_test_contact: false

inputs:
  stage00_run_id: "20260608_164408"
  stage00_runtime_run_dir: /content/lst_models_results/00_data_split_label_freeze/20260608_164408
  stage00_drive_run_dir: My Drive/lst_models/results/00_data_split_label_freeze/20260608_164408
  stage00_drive_path_parts:
    - lst_models
    - results
    - 00_data_split_label_freeze
    - "20260608_164408"
  stage00_run_manifest: /content/lst_models_results/00_data_split_label_freeze/20260608_164408/run_manifest.json
  raw_data_manifest: configs/lst_models_data.yaml
  notebook_path: notebooks/01_feature_window_search_colab.ipynb
  required_stage00_artifacts:
    - raw_data_manifest.json
    - split_freeze.json
    - label_policy.json
    - baseline_registry.json
    - sample_event_index.csv
    - run_manifest.json

outputs:
  output_dir: /content/lst_models_results/01_feature_window_search
  manifest: run_manifest.json
  artifact_inventory: artifact_inventory.csv
  summary: 01_feature_window_search_summary.csv
  candidate_inputs: 01_candidate_inputs.json
  probe_ledger: 01_train_inner_probe_ledger.csv
  fold_manifest: 01_train_inner_fold_manifest.csv

feature_sets:
  price_action_core:
    - log_return
    - close_to_open_return
    - high_low_range
    - rolling_volatility_20
  technical_price:
    - log_return
    - high_low_range
    - rolling_volatility_20
    - rsi_14
    - bollinger_pctb
    - normalized_macd_hist
  price_volume_time:
    - log_return
    - close_to_open_return
    - high_low_range
    - rolling_volatility_20
    - normalized_volume_20
    - rsi_14
    - bollinger_pctb
    - normalized_macd_hist
    - time_of_day_sin
    - time_of_day_cos

window_sizes: [10, 20, 30]

train_inner:
  n_folds: 2
  seeds: [101, 202]
  event_overlap_count_required: 0
  official_validation_for_selection: false

baseline_probes:
  mandatory_trivial:
    - stratified_dummy_train_prior
    - majority_train_prior

lightweight_probes:
  logreg_flat_control:
    enabled: true
    role: cheap_linear_sanity_check
    fixed_defaults:
      solver: liblinear
      class_weight: balanced
      max_iter: 2000
  lightgbm_small:
    enabled: true
    role: tabular_nonlinear_probe
    fixed_defaults:
      n_estimators: 200
      learning_rate: 0.03
      max_depth: 6
      num_leaves: 31
      subsample: 0.9
      colsample_bytree: 0.9
      class_weight: balanced
  dlinear_tiny:
    enabled: true
    role: simple_sequence_linear_probe
    fixed_defaults:
      mode: tiny_probe
  tcn_tiny:
    enabled: true
    role: causal_convolution_sequence_probe
    fixed_defaults:
      channels: [32, 32]
      kernel_size: 3
      dropout: 0.10
  ms_dlinear_tcn_tiny:
    enabled: true
    role: ian_aligned_hybrid_shape_signal_probe
    fixed_defaults:
      mode: tiny_probe
      tcn_channels: [32, 32]
      tcn_kernel_size: 3
      dropout: 0.10

optional_fixed_controls:
  simple_gru:
    enabled: false
    stage02_hpo_family: false
  shallow_lstm:
    enabled: false
    stage02_hpo_family: false

probe_training_defaults:
  torch:
    epochs: 8
    batch_size: 1024
    learning_rate: 0.001
    weight_decay: 0.0001
    dropout: 0.10
    optimizer: AdamW
    loss: class_weighted_cross_entropy
    early_stopping: none

budget:
  max_counted_probe_rows: 240

selection_rules:
  primary_metric: macro_f1
  baseline: stratified_dummy_train_prior
  require_mean_delta_macro_f1_vs_baseline_positive: true
  minimum_positive_ticker_count: 3
  max_candidate_inputs_for_stage02: 2
  no_final_model_selected: true

stage02_handoff:
  recommended_model_families:
    - lightgbm
    - dlinear_only
    - tcn_only
    - ms_dlinear_tcn
  control_models:
    - last_step_lightgbm_control
  recurrent_controls_are_optional_fixed_controls: true

forbidden:
  search_axes:
    - label_operator
    - horizon_k
    - no_trade_band_bps
    - calendar_split_boundaries
    - holdout_test_wording
  wording:
    - best model
    - final model
    - validation winner
    - holdout winner
    - official validation selected
