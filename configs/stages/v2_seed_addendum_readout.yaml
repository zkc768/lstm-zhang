# v2_seed_addendum_readout — disclosed post-hoc official-validation seed addendum.
#
# Trains the FROZEN Stage 02 primary spec (price_volume_time_w20 / tcn / tcn_p01)
# under six additional seeds and scores each seed EXACTLY ONCE on the official
# validation split, against the same-row registry baselines, with the identical
# Stage 03 mechanism. The output is a separate, disclosed addendum: it is NEVER
# merged into the predeclared n=2 readout (seeds 101/202), which remains the
# paper's canonical official-validation number either way.
#
# Preregistration sidecar (frozen before any addendum scoring event):
# docs/protocols/v2_seed_addendum_preregistration_20260701.md
stage_name: v2_seed_addendum_readout
route: lst_models
scope: validation_only
holdout_test_contact: false
official_validation_contact: true
official_validation_for_selection: false
evidence_status: official_validation_seed_addendum_disclosed_post_hoc
addendum_never_merged_into_predeclared_readout: true

inputs:
  # Identical pinned upstream chain as configs/stages/03_frozen_validation_readout.yaml.
  stage00_run_id: "20260610_051705_347450"
  stage00_runtime_run_dir: /content/lst_models_results/00_data_split_label_freeze/20260610_051705_347450
  stage00_drive_path_parts: [lst_models, results, 00_data_split_label_freeze, "20260610_051705_347450"]
  required_stage00_artifacts:
    - raw_data_manifest.json
    - split_freeze.json
    - label_policy.json
    - baseline_registry.json
    - sample_event_index.csv
    - run_manifest.json
    - artifact_inventory.csv
  stage01_run_id: "20260610_075002"
  stage01_runtime_run_dir: /content/lst_models_results/01_feature_window_search/20260610_075002
  stage01_drive_path_parts: [lst_models, results, 01_feature_window_search, "20260610_075002"]
  required_stage01_artifacts:
    - run_manifest.json
    - artifact_inventory.csv
    - 01_candidate_inputs.json
    - 01_feature_window_search_summary.csv
  stage02_run_id: "20260610_082130_797479"
  stage02_runtime_run_dir: /content/lst_models_results/02_model_hpo_train_inner/20260610_082130_797479
  stage02_drive_path_parts: [lst_models, results, 02_model_hpo_train_inner, "20260610_082130_797479"]
  superseded_stage02_run_ids: ["20260609_100637_704705", "20260610_010019_507648"]
  required_stage02_artifacts:
    - run_manifest.json
    - artifact_inventory.csv
    - 02_model_hpo_train_inner_summary.csv
    - 02_hpo_plan_ledger.csv
    - 02_hpo_trial_ledger.csv
    - 02_hpo_summary.csv
    - 02_baseline_control_summary.csv
    - 02_frozen_candidate.json
    - 02_frozen_candidate.md
    - 02_best_params_by_family.json
    - 02_stage03_handoff.json
  # Canonical Stage 03 run (context only; NEVER re-run, NEVER re-scored here).
  canonical_stage03_run_id: "20260610_133305_716174"
  raw_data_manifest: configs/lst_models_data.yaml
  raw_data_dir: /content/lst_models_raw_stock_data
  notebook_path: notebooks/v2_seed_addendum_readout_colab.ipynb

# Spec-identity bind: the addendum may train and score ONLY this frozen primary.
# The runner reads hpo_profile_params from the frozen 02_stage03_handoff.json
# primary_candidate and fails closed unless every field below matches it.
frozen_primary_identity:
  candidate_id: price_volume_time_w20
  feature_set: price_volume_time
  window_size: 20
  model_family: tcn
  probe_id: tcn_tiny
  hpo_profile_id: tcn_p01

readout:
  # Deterministic seed rule (declared, not ad hoc): seed_k = 101 * k. The
  # predeclared readout used k in {1, 2} -> [101, 202]; the addendum takes the
  # next six consecutive multipliers k in {3..8} -> [303, 404, 505, 606, 707, 808].
  seed_rule: seed_k_equals_101_times_k_next_six_multipliers_k3_to_k8
  addendum_seeds: [303, 404, 505, 606, 707, 808]
  predeclared_seeds_never_rerun: [101, 202]
  refit_rows: all_eligible_official_train_rows
  scoring_rows: all_eligible_official_validation_rows
  refit_recipe: frozen_mechanism_chronological_tail_early_stopping
  score_each_seed_candidate_exactly_once: true
  max_materialized_train_bytes: 2000000000

# Asserted in code against the frozen Stage 00 split_freeze.json AND against
# the rebuilt bars/events at run time: no row at or after
# closed_holdout_test_start is ever read, windowed, or scored.
date_bounds:
  train_start: "1998-01-02"
  train_end_exclusive: "2013-09-16"
  validation_start: "2013-09-16"
  validation_end_exclusive: "2017-01-25"
  closed_holdout_test_start: "2017-01-25"

budget:
  # Exactly one scoring event per addendum seed; hard cap enforced in code.
  max_new_official_validation_scoring_events: 6
  contact_type: official_validation_seed_addendum
  data_segment: validation_2013_2017
  for_selection: false

# Predeclared reporting rules (descriptive only; there is NO pass/fail gate,
# NO selection, and NO merge into the predeclared n=2 readout):
predeclared_reporting:
  report_all_addendum_seeds_regardless_of_outcome: true
  summary_statistics: [min, median, max]
  primary_summary_metric: delta_macro_f1_vs_stratified_dummy_train_prior
  count_seeds_with_positive_delta: true
  interpretation: descriptive_dispersion_evidence_only
  wide_or_negative_touching_spread_is_reported_honestly: true
  canonical_readout: predeclared_n2_seeds_101_202_remains_canonical

baseline_controls:
  mandatory:
    - stratified_dummy_train_prior
    - majority_train_prior
    - constant_up
    - constant_down

# Byte-equal copy of the frozen Stage 03 torch training defaults
# (configs/stages/03_frozen_validation_readout.yaml), themselves byte-equal to
# Stage 02; the config contract test asserts the equality so the addendum refit
# mechanism cannot drift from the mechanism that produced the predeclared readout.
probe_training_defaults:
  torch:
    epochs: 64
    batch_size: 1024
    learning_rate: 0.001
    weight_decay: 0.0001
    device: auto
    require_gpu: false
    optimizer: AdamW
    loss: class_weighted_cross_entropy
    early_stopping: inner_train_chronological_tail
    early_stopping_validation_fraction: 0.2
    minimum_early_stopping_train_samples: 128
    minimum_early_stopping_validation_samples: 128
    early_stopping_patience: 8
    early_stopping_min_delta: 0.0
    gradient_clip_norm: 1.0

checkpointing:
  enabled: true
  checkpoint_after_each_seed: true
  checkpoint_dir: /content/lst_models_checkpoints/v2_seed_addendum_readout

# Exact-run resume: recovery for a crashed addendum run only. A resumed run
# rebuilds the ledger from the exact checkpoint folder and never repeats a
# scoring event. Fresh runs keep enabled: false.
resume:
  enabled: false
  run_id: null
  checkpoint_dir: null

outputs:
  output_dir: /content/lst_models_results/v2_seed_addendum_readout
  manifest: run_manifest.json
  artifact_inventory: artifact_inventory.csv
  validation_readout: v2sa_validation_readout.csv
  per_ticker_readout: v2sa_per_ticker_readout.csv
  seed_dispersion_summary: v2sa_seed_dispersion_summary.csv
  same_row_baselines: v2sa_same_row_baselines.csv
  validation_predictions: v2sa_validation_predictions.csv
  decision_record: v2sa_decision_record.json
  budget_ledger_row: v2sa_budget_ledger_row.csv

forbidden:
  actions:
    - merge_with_predeclared_n2_readout
    - rerun_predeclared_seeds_101_202
    - model_selection
    - threshold_tuning
    - seed_screening_or_dropping
    - additional_seeds_after_first_scoring_event
    - holdout_test_contact
  wording:
    - final model
    - best model
    - superior
    - outperforms
    - significant
    - profitable
    - well-calibrated
    - clean test
    - out-of-sample proof
    - selected by official validation
    - replaces the predeclared readout
    - confirms the validation readout
